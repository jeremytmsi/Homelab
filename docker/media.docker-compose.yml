services:
  media:
    image: jellyfin/jellyfin:10.11.11
    container_name: jellyfin
    restart: unless-stopped
    volumes:
      - jellyfin_config:/config
      - /mnt/Multimedia/Series:/media/Series
      - /mnt/Multimedia/Films:/media/Films
      - /mnt/Multimedia/Animes:/media/Animes
      - /mnt/Multimedia/Sports:/media/Sports
    ports:
      - 8096:8096
    networks:
      - front

  torrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.1
    container_name: qbittorrent
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Paris
      - WEBUI_PORT=9091
      - TORRENTING_PORT=6881
    volumes:
      - qbittorrent_config:/config
      - /mnt/Downloads:/downloads
    ports:
      - 9091:9091
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    networks:
      - front

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr
    restart: unless-stopped
    ports:
      - 8989:8989
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Paris
    volumes:
      - sonarr_config:/config
      - /mnt/Downloads/Series:/downloads/Series
      - /mnt/Downloads/Animes:/downloads/Animes
      - /mnt/Downloads/Sports:/downloads/Sports
      - /mnt/Multimedia/Series:/mnt/Series
      - /mnt/Multimedia/Animes:/mnt/Animes
      - /mnt/Multimedia/Sports:/mnt/Sports
    networks:
      - front

  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1
    container_name: radarr
    restart: unless-stopped
    ports:
      - 7878:7878
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Paris
    volumes:
      - radarr_config:/config
      - /mnt/Downloads/Films:/downloads/Films
      - /mnt/Multimedia/Films:/mnt/Films
    networks:
      - front

  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0
    container_name: lidarr
    restart: unless-stopped
    ports:
      - 8686:8686
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Paris
    volumes:
      - lidarr_config:/config
      - /mnt/Downloads/Music:/downloads/Music
      - /mnt/Multimedia/Music:/mnt/Music
    networks:
      - front

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - 9696:9696
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/Paris
    volumes:
      - prowlarr_config:/config
    networks:
      - front

  jellyseerr:
    image: fallenbagel/jellyseerr:preview-OIDC
    container_name: jellyseerr
    restart: unless-stopped
    ports:
      - 5055:5055
    environment:
      - TZ=Europe/Paris
    volumes:
      - jellyseerr_config:/app/config
    networks:
      - front

  musicseerr:
    image: ghcr.io/habirabbu/musicseerr:latest
    container_name: musicseerr
    environment:
      - PUID=1000
      - PGID=1000
      - PORT=8688
      - TZ=Etc/UTC
    ports:
      - "8688:8688"
    volumes:
      - musicseerr_config:/app/config
    restart: unless-stopped
    networks:
      - front

  navidrome:
    image: deluan/navidrome
    container_name: navidrome
    ports:
      - 4533:4533
    restart: unless-stopped
    volumes:
      - navidrome_data:/data
      - /mnt/Multimedia/Music:/music:ro
    networks:
      - front

volumes:
  jellyfin_config:
  qbittorrent_config:
  sonarr_config:
  radarr_config:
  prowlarr_config:
  jellyseerr_config:
  lidarr_config:
  musicseerr_config:
  navidrome_data:

networks:
  front:
    external: true
