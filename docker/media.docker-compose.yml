services:
  media:
    image: jellyfin/jellyfin
    container_name: jellyfin
    restart: unless-stopped
    hostname: media
    ports:
      - 8083:8096
    volumes:
      - jellyfin_config:/config
      - /mnt/Data/Multimedia/Medias:/media

  torrent:
    image: lscr.io/linuxserver/transmission
    container_name: transmission
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    ports:
      - 8084:9091
    volumes:
      - transmission_config:/config
      - /mnt/Data/Multimedia/Downloads:/downloads

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - sonarr_config:/config
      - /mnt/Data/Multimedia/Medias/Series:/media/series
      - /mnt/Data/Multimedia/Medias/Animes:/media/animes
      - /mnt/Data/Multimedia/Downloads/series:/mnt/Downloads/series
      - /mnt/Data/Multimedia/Downloads/animes:/mnt/Downloads/animes
    ports:
      - 8085:8989

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - radarr_config:/config
      - /mnt/Data/Multimedia/Medias/Films:/media/films
      - /mnt/Data/Multimedia/Downloads/films:/mnt/Downloads/films
    ports:
      - 8086:7878

  lidarr:
    image: lscr.io/linuxserver/lidarr
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
    volumes:
      - lidarr_config:/config
      - /mnt/Data/Multimedia/Medias/Music:/media/music
      - /mnt/Data/Multimedia/Downloads/Music:/mnt/Downloads/music
    ports:
      - 8087:8686


networks:
  front:
    external: true

volumes:
  jellyfin_config:
  transmission_config:
  sonarr_config:
  radarr_config:
  lidarr_config:
