global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['192.168.10.253:9100','192.168.10.252:9100','192.168.10.251:9100','192.168.10.250:9100','192.168.10.249:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
