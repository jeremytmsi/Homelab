services:
  uptime:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:2
    ports:
      - 3001:3001
    volumes:
      - uptime-kuma_data:/app/data
    networks:
      - front
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - prometheus_config:/etc/prometheus
    network_mode: host


volumes:
  uptime-kuma_data:
  prometheus_config:

networks:
  front:
    external: true
