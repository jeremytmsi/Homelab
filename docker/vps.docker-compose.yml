services:
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_config:/etc/grafana
    networks:
      - front
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`monitoring.${BASE_HOST}`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  headscale:
    image: headscale/headscale:stable
    container_name: headscale
    restart: always
    volumes:
      - headscale_config:/etc/headscale
      - headscale_lib:/var/lib/headscale
      - headscale_runtime:/var/run/headscale
    command: serve
    healthcheck:
      test: ["CMD", "headscale", "health"]
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - front
    labels:
      - traefik.enable=true
      - traefik.http.routers.headscale.rule=Host(`vpn.${BASE_HOST}`)
      - traefik.http.routers.headscale.entrypoints=web
      - traefik.http.services.headscale.loadbalancer.server.port=8080
      - me.tale.headplane.target=headscale

  headplane:
    image: ghcr.io/tale/headplane:0.6.2-beta.3
    container_name: headplane
    restart: unless-stopped
    depends_on:
      - headscale
    volumes:
      - headplane_config:/etc/headplane
      - headplane_data:/var/lib/headplane
      - headscale_config:/etc/headscale
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - front
    labels:
      - traefik.enable=true
      - traefik.http.routers.headplane.rule=Host(`vpn.${BASE_HOST}`) && PathPrefix(`/admin`)
      - traefik.http.routers.headplane.entrypoints=web
      - traefik.http.services.headplane.loadbalancer.server.port=3000

  authentik_db:
    image: postgres:16-alpine
    container_name: authentik_db
    restart: unless-stopped
    volumes:
      - authentik_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${PG_DB:-authentik}
      - POSTGRES_PASSWORD=${PG_PASS:?database password required}
      - POSTGRES_USER=${PG_USER:-authentik}
    networks:
      - front

  authentik_server:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.10.3}
    container_name: authentik_server
    command: server
    restart: unless-stopped
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    environment:
      - AUTHENTIK_POSTGRESQL__HOST=authentik_db
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB:-authentik}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-authentik}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:?secret key required}
    depends_on:
      - authentik_db
    networks:
      - front
    labels:
      - traefik.enable=true
      - traefik.http.routers.authentik.rule=Host(`auth.${BASE_HOST}`)
      - traefik.http.routers.authentik.entrypoints=web
      - traefik.http.services.authentik.loadbalancer.server.port=9000

  authentik_worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.10.3}
    container_name: authentik_worker
    command: worker
    restart: unless-stopped
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
      - authentik_templates:/templates
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTHENTIK_POSTGRESQL__HOST=authentik_db
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB:-authentik}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-authentik}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:?secret key required}
    depends_on:
      - authentik_db
    user: root
    networks:
      - front


networks:
  front:
    external: true

volumes:
  grafana_config:
  headscale_config:
    external: true
  headscale_lib:
  headscale_runtime:
  headplane_config:
    external: true
  headplane_data:
  authentik_db_data:
  authentik_media:
  authentik_templates:
  authentik_certs:
