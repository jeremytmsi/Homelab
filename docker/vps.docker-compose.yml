services:
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - grafana_config:/etc/grafana
      - grafana_dashboards:/var/lib/grafana/dashboards
    networks:
      - front
    environment:
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "authentik"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "${AUTHENTIK_GF_CLIENT_ID}"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "${AUTHENTIK_GF_CLIENT_SECRET}"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://auth.${BASE_HOST}/application/o/authorize/"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://auth.${BASE_HOST}/application/o/token/"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://auth.${BASE_HOST}/application/o/userinfo/"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "https://auth.${BASE_HOST}/application/o/grafana/end-session/"
      # Optionally enable auto-login (bypasses Grafana login screen)
      GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      # Optionally map user groups to Grafana roles
      # Required if Grafana is running behind a reverse proxy
      GF_SERVER_ROOT_URL: "https://monitoring.${BASE_HOST}"

  authentik_db:
    image: postgres:16-alpine
    container_name: authentik_db
    restart: unless-stopped
    volumes:
      - authentik_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${PG_DB:-authentik}
      - POSTGRES_PASSWORD=${PG_PASS:?database password required}
      - POSTGRES_USER=${PG_USER:-authentik}
    networks:
      - front

  authentik_server:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.10.3}
    container_name: authentik_server
    command: server
    restart: unless-stopped
    ports:
      - 9000:9000
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    environment:
      - AUTHENTIK_POSTGRESQL__HOST=authentik_db
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB:-authentik}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-authentik}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:?secret key required}
    depends_on:
      - authentik_db
    networks:
      - front

  authentik_worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.10.3}
    container_name: authentik_worker
    command: worker
    restart: unless-stopped
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
      - authentik_templates:/templates
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTHENTIK_POSTGRESQL__HOST=authentik_db
      - AUTHENTIK_POSTGRESQL__NAME=${PG_DB:-authentik}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${PG_PASS}
      - AUTHENTIK_POSTGRESQL__USER=${PG_USER:-authentik}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY:?secret key required}
    depends_on:
      - authentik_db
    user: root
    networks:
      - front


networks:
  front:
    external: true

volumes:
  grafana_config:
  grafana_dashboards:
  headscale_config:
    external: true
  headscale_lib:
  headscale_runtime:
  headplane_config:
    external: true
  headplane_data:
  authentik_db_data:
  authentik_media:
  authentik_templates:
  authentik_certs:
