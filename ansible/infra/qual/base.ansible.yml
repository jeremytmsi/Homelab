---
- name: Base configuration for all servers
  hosts: qual
  become: true

  roles:
    - prometheus.prometheus.node_exporter

  pre_tasks:
    - name: Set DNS server to 192.168.20.254
      ansible.builtin.copy:
        content: "nameserver 192.168.20.254"
        dest: /etc/resolv.conf

  tasks:
    - name: Update packages
      ansible.builtin.apt:
        name: "*"
        state: "latest"

    - name: Install htop
      ansible.builtin.apt:
        name: "htop"
        state: present

    - name: Install vim
      ansible.builtin.apt:
        name: "vim"
        state: present

    - name: Disable SSH root access
      ansible.builtin.replace:
        path: /etc/ssh/sshd_config
        regexp: '^#PermitRootLogin'
        replace: "PermitRootLogin no"
        backup: yes

    - name: Disable SSH password authentication
      ansible.builtin.replace:
        path: /etc/ssh/sshd_config
        regexp: '^#PasswordAuthentication yes'
        replace: "PasswordAuthentication no"
        backup: yes

    - name: Set keyboard to FR
      ansible.builtin.replace:
        path: /etc/default/keyboard
        regexp: '^XKBLAYOUT="us"'
        replace: 'XKBLAYOUT="fr"'

    - name: Restart SSH
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Reboot
      ansible.builtin.reboot:


