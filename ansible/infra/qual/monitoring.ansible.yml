---
- name: Install and configure Prometheus
  hosts: qual:&monitoring
  become: true

  roles:
    - prometheus.prometheus.prometheus
  vars:
    prometheus_scrape_configs:
      - job_name: "node-exporter"
        static_configs:
          - targets:
              - "192.168.20.253:9100"
              - "192.168.20.252:9100"
              - "192.168.20.251:9100"
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
