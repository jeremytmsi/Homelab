---
- name: Configure storage server firewall
  hosts: storage
  become: true
  become_method: su

  tasks:
    - name: Start nfs-utils service
      ansible.builtin.service:
        name: nfs-utils
        state: started

    - name: Start rpcbind service
      ansible.builtin.service:
        name: rpcbind
        state: started

    - name: Start nfs-mountd service
      ansible.builtin.service:
        name: nfs-mountd
        state: started

    - name: Open nfs port in firewalld
      ansible.builtin.firewalld:
        service: nfs
        state: enabled
        permanent: true
        immediate: true

    - name: Open rpcbind port in firewalld
      ansible.builtin.firewalld:
        service: rpc-bind
        state: enabled
        permanent: true
        immediate: true

    - name: Open mountd port in firewalld
      ansible.builtin.firewalld:
        service: mountd
        state: enabled
        permanent: true
        immediate: true
    
    - name: Create multimedia folder
      ansible.builtin.file:
        path: /mnt/Data/Multimedia
        state: directory

    - name: Create multimedia folder
      ansible.builtin.file:
        path: /mnt/Data/Drive
        state: directory

    - name: Copy exports file
      ansible.builtin.template:
        src: templates/nfs_exports.j2
        dest: /etc/exports
        mode: '0644'

    - name: Expose exports file
      ansible.builtin.command:
        cmd: "exportfs -ra"
