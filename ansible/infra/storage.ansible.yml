---
- name: Configure storage server firewall
  hosts: storage
  become: true
  become_method: su

  tasks:
    - name: Start nfs-utils service
      ansible.builtin.service:
        name: nfs-utils
        state: started

    - name: Start rpcbind service
      ansible.builtin.service:
        name: rpcbind
        state: started

    - name: Start nfs-mountd service
      ansible.builtin.service:
        name: nfs-mountd
        state: started

    - name: Open nfs port in firewalld
      ansible.builtin.firewalld:
        service: nfs
        state: enabled
        permanent: true
        immediate: true

    - name: Open rpcbind port in firewalld
      ansible.builtin.firewalld:
        service: rpc-bind
        state: enabled
        permanent: true
        immediate: true

    - name: Open mountd port in firewalld
      ansible.builtin.firewalld:
        service: mountd
        state: enabled
        permanent: true
        immediate: true

    - name: Format RAID
      ansible.builtin.filesystem:
        fstype: ext4
        dev: /dev/md0

    - name: Mount RAID
      ansible.posix.mount:
        path: /mnt/Data
        src: /dev/md0
        state: mounted
        fstype: ext4
    
    - name: Create multimedia folder
      ansible.builtin.file:
        path: /mnt/Data/Multimedia
        state: directory

    - name: Create drive folder
      ansible.builtin.file:
        path: /mnt/Data/Drive
        state: directory

    - name: Copy exports file
      ansible.builtin.template:
        src: templates/nfs_exports.j2
        dest: /etc/exports
        mode: '0644'

    - name: Expose exports file
      ansible.builtin.command:
        cmd: "exportfs -ra"

- name: Mount shares
  hosts: docker:!monitoring
  become: true
  become_method: su

  tasks:
    - name: Mount Multimedia share
      ansible.posix.mount:
        src: "{{ ansible_facts['default_ipv4']['network'].split('.')[:-1] | join('.') ~ '.3' }}:/mnt/Data/Multimedia"
        path: /mnt/Multimedia
        state: mounted
        fstype: nfs

    - name: Mount Drive share
      ansible.posix.mount:
        src: "{{ ansible_facts['default_ipv4']['network'].split('.')[:-1] | join('.') ~ '.3' }}:/mnt/Data/Drive"
        path: /mnt/Drive
        state: mounted
        fstype: nfs
