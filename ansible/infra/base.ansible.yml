---
- name: Base tasks + Prometheus config
  hosts: all:!vps
  become: true
  become_method: su

  roles:
    - prometheus.prometheus.node_exporter

  tasks:
    - name: Install base packages
      ansible.builtin.dnf:
        name:
          - htop
          - vim
          - wget
          - fastfetch
          - rsync
          - nfs-utils

    - name: Authorize port 9100 in firewall
      ansible.builtin.firewalld:
        port: 9100/tcp
        permanent: true
        state: enabled

- name: Install specific packages for storage VMs
  hosts: storage
  become: true
  become_method: su

  tasks:
    - name: Install specific packages
      ansible.builtin.dnf:
        name:
          - mdadm
