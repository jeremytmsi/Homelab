---
- name: Base tasks
  hosts: all
  become: true
  become_method: su

  tasks:
    - name: Install base packages
      ansible.builtin.dnf:
        name:
          - htop
          - vim
          - wget
          - fastfetch
          - iperf3
          - rsync

- name: Install specific packages for storage VMs
  hosts: storage
  become: true
  become_method: su

  tasks:
    - name: Install NFS specific packages
      ansible.builtin.dnf:
        name:
          - nfs-utils
          - mdadm

- name: Prometheus config for VMs
  hosts: all:!vps
  become: true
  become_method: su

  roles:
    - prometheus.prometheus.node_exporter

  tasks:
    - name: Authorize port 9100 in firewall
      ansible.builtin.firewalld:
        port: 9100/tcp
        permanent: true
        state: enabled
