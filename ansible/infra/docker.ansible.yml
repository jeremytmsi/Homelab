---
- name: Install Docker
  hosts: docker
  become: true

  tasks:
    - name: Add Docker repository
      ansible.builtin.yum_repository:
        name: docker-ce
        description: Docker Stable repository
        baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
        gpgcheck: yes
        gpgkey: https://download.docker.com/linux/centos/gpg
        enabled: yes
        state: present

    - name: Update DNF
      ansible.builtin.dnf:
        update_cache: true
        state: latest

    - name: Install Docker
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin

    - name: Start Docker
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started


    - name: Create front network
      community.docker.docker_network:
        name: front

- name: Launch main arcane container
  hosts: docker:!vps
  become: true

  tasks:
    - name: Create arcane data volume
      community.docker.docker_volume:
        name: arcane_data

    - name: Launch arcane container
      community.docker.docker_container:
        name: arcane
        image: ghcr.io/getarcaneapp/arcane:v1.16.1
        ports:
          - 9000:3552
        restart: yes
        restart_policy: always
        volumes:
          - arcane_data:/data
          - /var/run/docker.sock:/var/run/docker.sock
        networks:
          - name: front
        env:
          PUID: "0"
          PGID: "0"
          ENCRYPTION_KEY: "{{ arcane_encryption_key | string }}"
          JWT_SECRET: "{{ arcane_jwt_key | string }}"
        state: started

- name: Launch Arcane agent on the VPS
  hosts: docker:&vps
  become: true

  tasks:
    - name: Create Arcane agent data volume
      community.docker.docker_volume:
        name: arcane_agent_data

    - name: Create Arcane agent container
      community.docker.docker_container:
        name: arcane-agent
        image: ghcr.io/getarcaneapp/arcane-headless:v1.16.2
        ports:
          - 3553:3553
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - arcane_agent_data:/app/data
        restart_policy: unless-stopped
        env:
          AGENT_MODE: "true"
          AGENT_TOKEN: "{{ arcane_agent_token }}"
          MANAGER_API_URL: "https://containers.jeremytomasi.fr"
